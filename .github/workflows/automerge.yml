# Auto-merge pull requests by pre-commit.ci, and by dependabot for non-major version updates only.
#
# Callers must set:
# - `pull-requests: write` to approve the PR
# - `contents: write` to merge the PR
# - `actions: write` to avoid "GraphQL: Pull request refusing to allow a GitHub App to create or update workflow
#    without `workflows` permission (enablePullRequestAutoMerge)"
#
# Callers use the pull_request_target trigger, which is dangerous. Do not add unrelated logic to the caller workflow.
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request_target
#
# Example:
#
# name: Auto-merge
# on: pull_request_target
# jobs:
#   automerge:
#     uses: open-contracting/.github/.github/workflows/automerge.yml@main
#     permissions:
#       pull-requests: write
#       contents: write
name: Auto-merge
on: workflow_call
jobs:
  dependabot:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - id: dependabot-metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - if: ${{ steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' || steps.dependabot-metadata.outputs.package-ecosystem == 'github_actions' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve ${{ github.event.pull_request.html_url }}
      - if: ${{ steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' || steps.dependabot-metadata.outputs.package-ecosystem == 'github_actions' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ github.event.pull_request.html_url }}
  precommit:
    if: ${{ github.event.pull_request.user.login == 'pre-commit-ci[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve ${{ github.event.pull_request.html_url }}
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ github.event.pull_request.html_url }}
